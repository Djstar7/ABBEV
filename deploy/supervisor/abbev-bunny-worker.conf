; ---------------------------------------------------------------------------
; Workers Supervisor — pipeline d'upload vidéo ABBEV
;
; DEUX files séparées, pour que rien ne bloque personne :
;   - "bunny"     : assemblage + transfert réseau vers Bunny (I/O réseau)
;   - "transcode" : conversion ffmpeg webm/mkv… → MP4 iPhone (CPU, long)
; Un encodage lourd ne bloque plus un transfert, et plusieurs uploads
; simultanés sont traités EN PARALLÈLE (concurrence = numprocs).
;
; Installe ce fichier dans /etc/supervisor/conf.d/ puis :
;   sudo supervisorctl reread
;   sudo supervisorctl update
;   sudo supervisorctl start abbev-bunny-worker:* abbev-transcode-worker:*
;
; Adapte : le chemin du projet, l'utilisateur (www-data en général) et, si
; besoin, le binaire php. NE PAS mettre --timeout court : un PUT de plusieurs
; Go est légitime (le retry_after des connexions est à 7200s).
;
; Dimensionnement : numprocs = nb d'uploads/encodages simultanés. Adapte-le à
; ta RAM/CPU. Pour le transcode, ne dépasse pas le nb de cœurs (ffmpeg sature
; le CPU) — 1 à 2 suffisent généralement.
; ---------------------------------------------------------------------------
[program:abbev-bunny-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/abbev/artisan queue:work bunny --queue=bunny --timeout=0 --tries=3 --sleep=3 --backoff=30
directory=/var/www/abbev
autostart=true
autorestart=true
stopwaitsecs=7200
user=www-data
numprocs=3
redirect_stderr=true
stdout_logfile=/var/www/abbev/storage/logs/bunny-worker.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stopsignal=TERM

[program:abbev-transcode-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/abbev/artisan queue:work transcode --queue=transcode --timeout=0 --tries=1 --sleep=3
directory=/var/www/abbev
autostart=true
autorestart=true
stopwaitsecs=7200
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/abbev/storage/logs/transcode-worker.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stopsignal=TERM
